name: Build and Push
on: workflow_dispatch

jobs:
  android:
    uses: ./.github/workflows/android.yml
  ios:
    uses: ./.github/workflows/ios.yml
  linux:
    uses: ./.github/workflows/linux.yml
  mac:
    uses: ./.github/workflows/mac.yml
  windows:
    uses: ./.github/workflows/windows.yml
  miscellaneous:
    uses: ./.github/workflows/miscellaneous.yml

  publisher:
    needs: [linux, mac, android, ios, miscellaneous]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref_name }}

      - name: Delete old NDLL's and Hashlink Templates
        run: |
          rm -rf ndll
          mkdir ndll
          rm -rf templates/bin/hl/*/

      - name: Download Android-NDLL artifact
        uses: actions/download-artifact@v8
        with:
          name: Android-NDLL
          path: ndll/Android

      - name: Download iPhone-NDLL artifact
        uses: actions/download-artifact@v8
        with:
          name: iPhone-NDLL
          path: ndll/iPhone


      - name: Download Miscellaneous artifact
        uses: actions/download-artifact@v8
        with:
          name: Miscellaneous
          path: ./

      - name: Push to GitHub
        run: |
          USERACTOR=${{ github.actor }}
          USER_INFO=$(curl -s "https://api.github.com/users/$USERACTOR")
          USERID=$(echo "$USER_INFO" | jq -r '.id')
          USERNAME=$(echo "$USER_INFO" | jq -r '.name')

          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -f ndll
          git add -f tools/tools.n
          git add -f run.n
          # git add -f templates/bin/lime.exe
          git commit --author="${USERNAME} <${USERID}+$(echo "$USERACTOR" | sed 's/ /-/g')@users.noreply.github.com>" -m "Built and Pushed New NDLL's." || {
              echo "Didn't commit anything, skipping git push."
              exit 0
          }
          git push
